name: OIDC Claims Inspector
on:
  push:
    paths:
      - 'oidc-trigger.txt'
  pull_request:
permissions:
  id-token: write
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose OIDC availability
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL is set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo YES || echo NO)"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ] && echo YES || echo NO)"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            TOKEN=$(curl -sLS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=test-audience" | jq -r '.value')
            echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq . || echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null
          fi
          echo "event_name=${GITHUB_EVENT_NAME} ref=${GITHUB_REF} actor=${GITHUB_ACTOR}"
