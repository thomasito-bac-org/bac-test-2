name: OIDC Claims Inspector
on:
  push:
    paths:
      - 'oidc-trigger.txt'
  pull_request:
permissions:
  id-token: write
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Request and decode OIDC token
        run: |
          TOKEN=$(curl -sLS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=test-audience" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq . || echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null
          echo "---event info---"
          echo "event_name=${GITHUB_EVENT_NAME} ref=${GITHUB_REF} head_ref=${GITHUB_HEAD_REF} base_ref=${GITHUB_BASE_REF} actor=${GITHUB_ACTOR} repository=${GITHUB_REPOSITORY}"
