name: Artifact Test
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p out
          echo "ARTIFACT_MARKER_$(date +%s)" > out/artifact-file.txt
      - uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: out/artifact-file.txt
