name: Cache Test
on:
  push:
jobs:
  cache-test:
    runs-on: ubuntu-latest
    steps:
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: cache-dir
          key: never-matches-${{ github.run_id }}
          restore-keys: |
            shared-cache-key-
      - name: Show what was restored
        run: |
          mkdir -p cache-dir
          if [ -f cache-dir/marker.txt ]; then
            echo "CACHE HIT - restored content:"
            cat cache-dir/marker.txt
          else
            echo "CACHE MISS - no prior content found"
          fi
      - name: Write new marker for this run
        run: |
          echo "written-by-branch=${GITHUB_REF_NAME} actor=${GITHUB_ACTOR} run=${GITHUB_RUN_ID}" > cache-dir/marker.txt
          cat cache-dir/marker.txt
      - name: Save cache under branch-specific key
        uses: actions/cache/save@v4
        with:
          path: cache-dir
          key: shared-cache-key-${{ github.run_id }}
