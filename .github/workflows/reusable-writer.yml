name: Reusable Writer
on:
  workflow_call:
permissions:
  contents: write
jobs:
  try-write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Attempt a write using GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "escalation-test-$(date +%s)" > escalation-marker.txt
          git config user.email "test@example.com"
          git config user.name "Reusable Writer"
          git add escalation-marker.txt
          git commit -m "reusable workflow write attempt"
          git push https://x-access-token:${GH_TOKEN}@github.com/thomasito-bac-org/bac-test-2.git HEAD:main && echo "WRITE_SUCCEEDED" || echo "WRITE_FAILED"
